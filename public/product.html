<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAISON VERDANT — Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --white: #ffffff; --grey-100: #f0efed; --grey-200: #e2e1de;
      --grey-300: #c8c7c3; --grey-400: #9e9d98; --grey-500: #6b6a66; --grey-700: #3a3936; --black: #1a1917;
    }
    body { background: var(--bg); color: var(--black); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
    header { background: var(--white); border-bottom: 1px solid var(--grey-200); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--black); text-decoration: none; }
    .header-nav { display: flex; gap: 28px; list-style: none; }
    .header-nav a { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-500); text-decoration: none; transition: color 0.2s; }
    .header-nav a:hover { color: var(--black); }

    .breadcrumb { padding: 20px 40px; display: flex; align-items: center; gap: 10px; }
    .breadcrumb a, .breadcrumb span { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-400); text-decoration: none; }
    .breadcrumb a:hover { color: var(--black); }
    .breadcrumb .sep { color: var(--grey-300); }

    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 0; max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }

    /* IMAGE SIDE */
    .product-gallery { position: sticky; top: 80px; align-self: start; }
    .main-image { width: 100%; aspect-ratio: 3/4; background: var(--grey-100); overflow: hidden; }
    .main-image img { width: 100%; height: 100%; object-fit: cover; }
    .img-placeholder-large { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--grey-100); }
    .img-placeholder-large span { font-family: 'Playfair Display', serif; font-size: 5rem; color: var(--grey-300); }

    /* INFO SIDE */
    .product-details { padding: 40px 0 0 60px; }
    .product-tag { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--grey-400); margin-bottom: 12px; }
    .product-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; line-height: 1.2; color: var(--black); margin-bottom: 8px; }
    .product-brand-line { font-size: 0.82rem; color: var(--grey-500); margin-bottom: 28px; letter-spacing: 0.05em; }
    .product-price { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--black); margin-bottom: 32px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--grey-200); border: 1px solid var(--grey-200); margin-bottom: 36px; }
    .info-cell { background: var(--white); padding: 14px 16px; }
    .info-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-400); margin-bottom: 4px; }
    .info-value { font-size: 0.85rem; color: var(--black); }

    .product-description { font-size: 0.88rem; line-height: 1.8; color: var(--grey-500); margin-bottom: 36px; border-left: 2px solid var(--grey-200); padding-left: 20px; }

    .btn-add { width: 100%; padding: 16px; background: var(--black); color: var(--white); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; }
    .btn-add:hover { background: var(--grey-700); }
    .btn-back { width: 100%; padding: 14px; background: transparent; color: var(--grey-500); border: 1px solid var(--grey-200); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; text-align: center; }
    .btn-back:hover { border-color: var(--grey-500); color: var(--black); }

    .collab-badge { display: inline-block; padding: 4px 10px; background: var(--black); color: var(--white); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }

    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .loading-state span { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--grey-400); }
    .error-state { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; }
    .error-state.visible { display: flex; }
    .error-state p { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--grey-300); }

    @media (max-width: 900px) {
      .product-layout { grid-template-columns: 1fr; padding: 0 20px 60px; }
      .product-gallery { position: static; }
      .product-details { padding: 28px 0 0 0; }
    }
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .header-nav { display: none; }
      .breadcrumb { padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Maison Verdant</a>
    <nav><ul class="header-nav">
      <li><a href="index.html">Collection</a></li>
      <li><a href="#">Lookbook</a></li>
      <li><a href="#">A propos</a></li>
      <li><a href="#">Contact</a></li>
    </ul></nav>
  </header>

  <div class="breadcrumb">
    <a href="index.html">Collection</a>
    <span class="sep">/</span>
    <span id="breadcrumbName">Chargement...</span>
  </div>

  <div id="loadingState" class="loading-state"><span>Chargement de l'article...</span></div>
  <div id="errorState" class="error-state"><p>Article introuvable</p><a href="index.html" class="btn-back" style="max-width:240px">Retour a la collection</a></div>

  <div id="productContent" style="display:none">
    <div class="product-layout">
      <div class="product-gallery">
        <div class="main-image" id="mainImage"></div>
      </div>
      <div class="product-details">
        <div id="collabBadge" class="collab-badge" style="display:none">Edition limitee</div>
        <div class="product-tag" id="productType"></div>
        <h1 class="product-title" id="productTitle"></h1>
        <div class="product-brand-line" id="productBrand"></div>
        <div class="product-price" id="productPrice"></div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-label">Origine</div><div class="info-value" id="infoRegion"></div></div>
          <div class="info-cell"><div class="info-label">Marque</div><div class="info-value" id="infoBrand"></div></div>
          <div class="info-cell"><div class="info-label">Reference</div><div class="info-value" id="infoRef"></div></div>
          <div class="info-cell"><div class="info-label">Disponibilite</div><div class="info-value">En stock</div></div>
        </div>
        <p class="product-description" id="productDesc"></p>
        <button class="btn-add" onclick="addToCart()">Ajouter au panier</button>
        <a href="index.html" class="btn-back">Retour a la collection</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get('id'));

    const descriptions = [
      "Une piece taillee dans un coton oxford de premiere qualite, au grammage genereux. La coupe s'inspire des archives des annees 1960, revisitee avec une aisance contemporaine.",
      "Confectionnee a la main dans les ateliers historiques de Lyon, cette cravate en soie pure exprime une elegance discrète et sure. Le noeud glisse avec une facilite remarquable.",
      "Construite sur une toile de lin interlignee, cette veste adopte une silhouette ajustee qui preserve sa structure au fil des heures.",
      "Le lin portugais, recolte et file dans la region de l'Alentejo, offre une texture legerement irreguliere qui constitue tout le caractere de cette chemise.",
      "Piece de collection realisee en collaboration avec un artisan japonais specialise dans les broderies a l'aiguille d'or.",
    ];

    async function loadProduct() {
      if (!productId) { showError(); return; }
      let product = null;
      try {
        const res = await fetch(`/api/products/${productId}`);
        if (!res.ok) throw new Error();
        product = await res.json();
      } catch {
        // Fallback statique
        const fallback = [
          { id: 1,  name: "Chemise Oxford No. 4",       type: "Chemise",    brand: "Verdant",       region: "France",     price: 145, collab: false, image: "" },
          { id: 2,  name: "Cravate Soie Vert Nuit",     type: "Cravate",    brand: "Leclaire",      region: "France",     price: 89,  collab: false, image: "" },
          { id: 3,  name: "Veste Ceremony",             type: "Veste",      brand: "Moreau & Fils", region: "Italie",     price: 490, collab: false, image: "" },
          { id: 4,  name: "Chemise Lin Blanc Brut",     type: "Chemise",    brand: "Archipel",      region: "Portugal",   price: 110, collab: false, image: "" },
          { id: 5,  name: "Pochette Argent Vol.1",      type: "Accessoire", brand: "Verdant",       region: "Japon",      price: 55,  collab: true,  image: "" },
          { id: 6,  name: "Chemise Popeline Noire",     type: "Chemise",    brand: "Verdant",       region: "France",     price: 130, collab: false, image: "" },
          { id: 7,  name: "Pantalon Flanelle Gris",     type: "Pantalon",   brand: "Moreau & Fils", region: "Angleterre", price: 210, collab: false, image: "" },
          { id: 8,  name: "Cravate Rayee Bordeaux",     type: "Cravate",    brand: "Leclaire",      region: "Italie",     price: 75,  collab: false, image: "" },
          { id: 9,  name: "Chemise Madras x Archipel",  type: "Chemise",    brand: "Archipel",      region: "Japon",      price: 175, collab: true,  image: "" },
          { id: 10, name: "Boutons de manchette Noirs", type: "Accessoire", brand: "Verdant",       region: "France",     price: 45,  collab: false, image: "" },
          { id: 11, name: "Chemise Coton Sea Island",   type: "Chemise",    brand: "Moreau & Fils", region: "Angleterre", price: 225, collab: false, image: "" },
          { id: 12, name: "Veste Tweed Ecossais",       type: "Veste",      brand: "Leclaire",      region: "Angleterre", price: 540, collab: false, image: "" },
          { id: 13, name: "Ceinture Cuir Naturel",      type: "Accessoire", brand: "Archipel",      region: "Portugal",   price: 95,  collab: false, image: "" },
          { id: 14, name: "Chemise Denim Delave",       type: "Chemise",    brand: "Verdant",       region: "Japon",      price: 160, collab: false, image: "" },
          { id: 15, name: "Pantalon Chino Ivoire",      type: "Pantalon",   brand: "Archipel",      region: "Portugal",   price: 185, collab: false, image: "" },
          { id: 16, name: "Pochette Soie x Moreau",     type: "Accessoire", brand: "Moreau & Fils", region: "Italie",     price: 65,  collab: true,  image: "" },
        ];
        product = fallback.find(p => p.id === productId) || null;
      }

      if (!product) { showError(); return; }
      renderProduct(product);
    }

    function renderProduct(p) {
      document.title = `${p.name} — Maison Verdant`;
      document.getElementById('breadcrumbName').textContent = p.name;
      document.getElementById('productType').textContent = p.type;
      document.getElementById('productTitle').textContent = p.name;
      document.getElementById('productBrand').textContent = p.brand;
      document.getElementById('productPrice').textContent = `${p.price} EUR`;
      document.getElementById('infoRegion').textContent = p.region;
      document.getElementById('infoBrand').textContent = p.brand;
      document.getElementById('infoRef').textContent = `MV-${String(p.id).padStart(4, '0')}`;
      document.getElementById('productDesc').textContent = descriptions[(p.id - 1) % descriptions.length];

      const mainImg = document.getElementById('mainImage');
      mainImg.innerHTML = p.image
        ? `<img src="${p.image}" alt="${p.name}"/>`
        : `<div class="img-placeholder-large"><span>${p.name.charAt(0)}</span></div>`;

      if (p.collab) document.getElementById('collabBadge').style.display = 'inline-block';

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('productContent').style.display = 'block';
    }

    function showError() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').classList.add('visible');
    }

    function addToCart() {
      alert('Fonctionnalite panier a implementer.');
    }

    loadProduct();
  </script>
</body>
</html>
